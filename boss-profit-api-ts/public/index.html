<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BOSS PROFIT API Viewer</title>
    <style>
      :root { --ink:#1d1714; --muted:#76695f; --line:#e4d6c5; --paper:#fffaf2; --panel:#f6efe5; --accent:#e76f4d; --green:#5c8d4a; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--paper); color:var(--ink); font-family:Arial,"Noto Sans KR",sans-serif; }
      header { border-bottom:3px solid var(--accent); background:var(--ink); color:white; }
      .wrap { width:min(1120px, calc(100% - 32px)); margin:0 auto; }
      .top { display:flex; align-items:center; justify-content:space-between; min-height:72px; gap:16px; }
      .brand { color:var(--accent); font-family:Georgia,serif; font-size:26px; font-weight:800; }
      .tag { color:#b8aaa0; font-size:13px; letter-spacing:.08em; }
      main { padding:36px 0 64px; }
      h1 { margin:0 0 8px; font-size:32px; }
      p { margin:0; color:var(--muted); line-height:1.6; }
      .summary { display:grid; grid-template-columns:repeat(3,1fr); border:1px solid var(--line); margin:28px 0; background:#fffdf8; }
      .summary div { padding:18px 20px; border-right:1px solid var(--line); }
      .summary div:last-child { border-right:0; }
      .label { display:block; margin-bottom:8px; color:var(--muted); font-size:13px; font-weight:700; }
      .value { font-size:28px; font-weight:800; }
      .value.accent { color:var(--accent); }
      .grid { display:grid; grid-template-columns:360px 1fr; gap:24px; align-items:start; }
      .panel { border:1px solid var(--line); background:#fffdf8; }
      .panel h2 { margin:0; padding:18px 20px; border-bottom:1px solid var(--line); background:var(--panel); font-size:20px; }
      .menu-list { display:grid; }
      button.menu { width:100%; padding:16px 20px; border:0; border-bottom:1px solid var(--line); background:transparent; color:var(--ink); cursor:pointer; text-align:left; }
      button.menu:hover, button.menu.active { background:#f7eadc; }
      .menu-name { display:flex; justify-content:space-between; gap:12px; font-size:17px; font-weight:800; }
      .menu-meta { margin-top:6px; color:var(--muted); font-size:13px; }
      .result { padding:22px; }
      .result-head { display:flex; justify-content:space-between; gap:16px; margin-bottom:22px; }
      .result-title { font-size:30px; font-weight:900; }
      .price { color:var(--muted); font-size:15px; }
      .metrics { display:grid; grid-template-columns:repeat(3,1fr); border:1px solid var(--line); margin-bottom:26px; }
      .metric { padding:18px; border-right:1px solid var(--line); }
      .metric:last-child { border-right:0; }
      .metric strong { display:block; margin-top:8px; font-size:26px; }
      .metric.green strong { color:var(--green); }
      table { width:100%; border-collapse:collapse; }
      th { background:var(--ink); color:white; text-align:left; }
      th,td { padding:13px 14px; border-bottom:1px solid var(--line); font-size:14px; }
      td.num, th.num { text-align:right; }
      .bar { height:10px; overflow:hidden; background:#eee3d4; }
      .bar span { display:block; height:100%; background:var(--accent); }
      .empty { padding:40px 22px; color:var(--muted); }
      @media (max-width:820px) { .summary,.grid,.metrics { grid-template-columns:1fr; } .summary div,.metric { border-right:0; border-bottom:1px solid var(--line); } .result-head { display:block; } }
    </style>
  </head>
  <body>
    <header><div class="wrap top"><div><span class="brand">BOSSPROFIT</span> <span class="tag">API VIEWER</span></div><span class="tag"><a href="/schema.html" style="color:#fff;text-decoration:none;border-bottom:1px solid #e76f4d;">DB 구조 보기</a> · TypeScript · Express · Prisma · SQLite</span></div></header>
    <main class="wrap">
      <h1>메뉴 원가 관리 API 화면</h1>
      <p>DB에 저장된 메뉴, 재료, 레시피 항목을 API로 조회하고 메뉴별 원가와 마진을 계산합니다.</p>
      <section class="summary">
        <div><span class="label">메뉴 수</span><span class="value" id="menuCount">-</span></div>
        <div><span class="label">선택 메뉴</span><span class="value accent" id="selectedName">-</span></div>
        <div><span class="label">마진율</span><span class="value" id="selectedRate">-</span></div>
      </section>
      <section class="grid">
        <aside class="panel"><h2>메뉴 목록</h2><div class="menu-list" id="menuList"></div></aside>
        <section class="panel"><h2>원가 계산 결과</h2><div class="result" id="result"><div class="empty">메뉴를 선택하면 원가 계산 결과가 표시됩니다.</div></div></section>
      </section>
    </main>
    <script>
      const menuList = document.getElementById("menuList");
      const result = document.getElementById("result");
      const menuCount = document.getElementById("menuCount");
      const selectedName = document.getElementById("selectedName");
      const selectedRate = document.getElementById("selectedRate");
      const money = new Intl.NumberFormat("ko-KR");
      async function fetchJson(url) { const response = await fetch(url); if (!response.ok) throw new Error(`${response.status} ${response.statusText}`); return response.json(); }
      function renderMenus(menus) {
        menuCount.textContent = menus.length;
        menuList.innerHTML = menus.map((menu) => `<button class="menu" type="button" data-id="${menu.id}"><span class="menu-name"><span>${menu.name}</span><span>${money.format(menu.price)}원</span></span><span class="menu-meta">${menu.category} · ID ${menu.id}</span></button>`).join("");
        document.querySelectorAll("button.menu").forEach((button) => button.addEventListener("click", () => loadCost(button.dataset.id)));
      }
      function renderCost(data) {
        selectedName.textContent = data.menu;
        selectedRate.textContent = `${data.margin_rate}%`;
        const maxCost = Math.max(...data.items.map((item) => item.cost), 1);
        result.innerHTML = `<div class="result-head"><div><div class="result-title">${data.menu}</div><div class="price">판매가 ${money.format(data.price)}원</div></div></div><div class="metrics"><div class="metric"><span class="label">총 재료 원가</span><strong>${money.format(data.total_cost)}원</strong></div><div class="metric green"><span class="label">마진</span><strong>${money.format(data.margin)}원</strong></div><div class="metric"><span class="label">마진율</span><strong>${data.margin_rate}%</strong></div></div><table><thead><tr><th>재료</th><th class="num">사용량</th><th class="num">단가</th><th class="num">원가</th><th>비중</th></tr></thead><tbody>${data.items.map((item) => { const ratio = Math.round((item.cost / maxCost) * 100); return `<tr><td>${item.ingredient}</td><td class="num">${item.quantity}${item.unit}</td><td class="num">${money.format(item.unit_price)}원/${item.unit}</td><td class="num">${money.format(item.cost)}원</td><td><div class="bar"><span style="width:${ratio}%"></span></div></td></tr>`; }).join("")}</tbody></table>`;
      }
      async function loadCost(id) {
        document.querySelectorAll("button.menu").forEach((button) => button.classList.toggle("active", button.dataset.id === id));
        renderCost(await fetchJson(`/api/menus/${id}/cost`));
      }
      async function init() {
        try { const menus = await fetchJson("/api/menus"); renderMenus(menus); if (menus[0]) await loadCost(menus[0].id); }
        catch (error) { result.innerHTML = `<div class="empty">API를 불러오지 못했습니다: ${error.message}</div>`; }
      }
      init();
    </script>
  </body>
</html>
